name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: jdx/mise-action@v2
      - name: Check formatting
        run: zig fmt --check src/ build.zig
      - name: Build
        run: zig build
      - name: Test
        run: zig build test --summary all
